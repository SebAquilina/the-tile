# wrangler.toml — Cloudflare Pages + D1 binding for The Tile
#
# Production deploys on push to `main`.
# Note: CF Pages only supports the env names `preview` and `production` —
# unlike Workers, custom env names like `staging` are rejected by recent
# wrangler versions during validation. Staging-on-push-to-staging-branch
# is therefore handled at the GitHub Actions level (deploy.yml chooses
# which D1 to migrate by branch) rather than here.

name = "the-tile"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = "apps/web/.next"

# --- Production (main) ----------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "the-tile-prod"
database_id = "8ced740d-cd95-4945-9077-14e90c660325"
migrations_dir = "apps/web/drizzle"

[vars]
NEXT_PUBLIC_SITE_URL = "https://www.the-tile.com"

# --- Preview (feature branches) ------------------------------------------
[env.preview]

[[env.preview.d1_databases]]
binding = "DB"
database_name = "the-tile-staging"
database_id = "eb42bd66-c9ec-4574-a207-b0c2a940706c"
migrations_dir = "apps/web/drizzle"

[env.preview.vars]
NEXT_PUBLIC_SITE_URL = "https://preview.the-tile.com"
