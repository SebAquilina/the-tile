name: CI

on:
  pull_request:
  push:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: actionlint (catches step-if secrets.* and similar)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        # The exact failure mode from the v1 build — secrets.X referenced
        # inside a step-level if: — is caught here before merge.
        run: |
          curl -sSL \
            https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash \
            | bash -s -- 1.7.7
          ./actionlint -color

  check:
    name: Lint · typecheck · unit tests · build
    runs-on: ubuntu-latest
    needs: workflow-lint
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm validate-seed

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - name: Build
        run: pnpm build
        env:
          GEMINI_API_KEY: ci-placeholder
          NEXT_PUBLIC_SITE_URL: https://www.the-tile.com

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build
        env:
          GEMINI_API_KEY: ci-placeholder
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Run Playwright (skip dialogue battery — needs real Gemini key)
        run: pnpm test:e2e
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_TEST }}
          SKIP_DIALOGUE_BATTERY: "1"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  audit-bundle:
    name: Audit deployed bundle (secrets, headers, routes)
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Wait for Pages deploy
        run: sleep 180  # deploy needs time to propagate; raised after CI flakiness
      - name: audit-secrets (no leaked keys in JS bundle)
        run: bash apps/web/scripts/audit/audit-secrets.sh
        env:
          BASE_URL: https://the-tile-web.pages.dev
      - name: audit-headers (CSP, HSTS, X-Frame, etc)
        run: bash apps/web/scripts/audit/audit-headers.sh
        env:
          BASE_URL: https://the-tile-web.pages.dev
      - name: audit-routes (every product URL resolves)
        run: bash apps/web/scripts/audit/audit-routes.sh
        env:
          BASE_URL: https://the-tile-web.pages.dev
