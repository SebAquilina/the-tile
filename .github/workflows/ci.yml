name: CI

on:
  pull_request:
  push:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint · typecheck · unit tests · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm validate-seed

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # CI uses a dummy key so the build graph (which imports env at
          # module load) doesn't complain. Runtime streaming tests are in
          # the e2e job.
          GEMINI_API_KEY: ci-placeholder
          NEXT_PUBLIC_SITE_URL: https://www.the-tile.com

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build
        env:
          GEMINI_API_KEY: ci-placeholder
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Run Playwright
        run: pnpm test:e2e
        env:
          # Empty PLAYWRIGHT_BASE_URL + empty TURNSTILE_SECRET lets the
          # config's webServer start pnpm start fresh and skips the bot
          # check entirely. GEMINI_API_KEY is optional — the agent smoke
          # test skips itself when unset.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_TEST }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
