name: Deploy

on:
  push:
    branches: [main, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    permissions:
      contents: read
      deployments: write
    env:
      # Surfacing the optional Sentry token into env lets the step-level
      # conditional below reference it (GitHub Actions doesn't allow
      # secrets.* in step if: expressions).
      SENTRY_AUTH_TOKEN_PRESENT: ${{ secrets.SENTRY_AUTH_TOKEN != '' && 'yes' || 'no' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ github.ref == 'refs/heads/main' && 'https://www.the-tile.com' || 'https://staging.the-tile.com' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            pnpm db:migrate:prod
          else
            pnpm db:migrate:staging
          fi

      - name: Sync seed → D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm sync-seed ${{ github.ref_name }}

      - name: Adapt Next.js for CF Pages (next-on-pages)
        # apps/web/.next/cache/webpack/*.pack is ~40+ MB and CF Pages rejects.
        # The runtime build artefacts (server/, static/) live elsewhere under .next
        # and don't depend on the cache directory. Removing it before upload.
        run: npx --yes @cloudflare/next-on-pages@latest

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/.vercel/output/static --project-name=the-tile-web --branch=${{ github.ref_name }} --commit-dirty=true
          
          branch: ${{ github.ref_name }}

      - name: Upload Sentry release
        if: github.ref == 'refs/heads/main' && env.SENTRY_AUTH_TOKEN_PRESENT == 'yes'
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: the-tile
          SENTRY_PROJECT: web
        with:
          environment: production
          sourcemaps: apps/web/.vercel/output/static
